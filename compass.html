<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Compass | เกมทำนายอาชีพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div id="app" class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden p-6 md:p-8">
        <!-- Content will be injected here -->
    </div>

    <script>
        const questions = [
            {
                q: "เมื่อคุณต้องแก้ปัญหาที่ซับซ้อน คุณมักจะ...",
                options: [
                    { text: "วิเคราะห์ข้อมูลและหาเหตุผลอย่างเป็นระบบ", type: "logic" },
                    { text: "ใช้ความคิดสร้างสรรค์มองหามุมใหม่ๆ", type: "creative" },
                    { text: "ปรึกษาหารือกับคนรอบข้าง", type: "social" },
                    { text: "ลงมือทดลองทำดูจนกว่าจะสำเร็จ", type: "practical" }
                ]
            },
            {
                q: "บรรยากาศการทำงานที่คุณชื่นชอบคือแบบไหน?",
                options: [
                    { text: "เงียบสงบ ได้ใช้สมาธิอยู่กับตัวเอง", type: "logic" },
                    { text: "อิสระ เต็มไปด้วยไอเดียและสีสัน", type: "creative" },
                    { text: "คึกคัก ได้พูดคุยและช่วยเหลือผู้คน", type: "social" },
                    { text: "เน้นเป้าหมายชัดเจน มีการบริหารจัดการที่ดี", type: "leader" }
                ]
            },
            {
                q: "งานอดิเรกที่คุณมักจะทำในเวลาว่างคืออะไร?",
                options: [
                    { text: "อ่านหนังสือหรือเรียนรู้เรื่องเทคโนโลยี", type: "logic" },
                    { text: "วาดรูป แต่งเพลง หรือทำงานฝีมือ", type: "creative" },
                    { text: "อาสาช่วยเหลือสังคม หรือเล่นกีฬาเป็นทีม", type: "social" },
                    { text: "วางแผนโปรเจกต์เล็กๆ หรือธุรกิจส่วนตัว", type: "leader" }
                ]
            },
            {
                q: "ถ้าต้องเลือกบทบาทในกลุ่มเพื่อน คุณคือ...",
                options: [
                    { text: "คนที่หาข้อมูลมาแก้ปัญหาให้เพื่อน", type: "logic" },
                    { text: "คนที่เสนอไอเดียแปลกใหม่ให้กลุ่ม", type: "creative" },
                    { text: "คนที่คอยรับฟังและจัดการความขัดแย้ง", type: "social" },
                    { text: "คนที่ตัดสินใจและสั่งการให้งานเดินหน้า", type: "leader" }
                ]
            }
        ];

        const careers = {
            logic: { title: "นักวิเคราะห์ / นักพัฒนาซอฟต์แวร์", desc: "เหมาะกับงานที่ใช้ตรรกะและการวางแผน มีความแม่นยำสูง" },
            creative: { title: "นักออกแบบ / ครีเอทีฟ", desc: "เหมาะกับงานที่ได้ใช้ความคิดสร้างสรรค์และแสดงตัวตน" },
            social: { title: "ที่ปรึกษา / ครู / จิตวิทยา", desc: "เหมาะกับงานที่ได้ช่วยเหลือและสร้างความสัมพันธ์กับผู้คน" },
            leader: { title: "ผู้ประกอบการ / ผู้บริหาร", desc: "เหมาะกับการเป็นผู้นำ มีวิสัยทัศน์และการจัดการที่ดี" },
            practical: { title: "วิศวกร / นักนวัตกรรม", desc: "เหมาะกับการลงมือทำ เห็นผลลัพธ์ที่เป็นรูปธรรม" },
            tech: { title: "ผู้เชี่ยวชาญด้าน AI / Data", desc: "เหมาะกับเทคโนโลยีอนาคตและการประมวลผลข้อมูล" },
            health: { title: "ผู้เชี่ยวชาญสุขภาพ / การแพทย์", desc: "เหมาะกับงานที่ดูแลชีวิตและคุณภาพความเป็นอยู่" }
        };

        const fortunes = {
            logic: "ดวงงานพุ่งในสายวิเคราะห์! ข้อมูลที่คุณถืออยู่ในมือจะนำคุณไปสู่โอกาสทางธุรกิจใหม่ๆ ที่ไม่มีใครคาดคิด",
            creative: "แรงบันดาลใจจะมาในจังหวะที่คุณคาดไม่ถึง ผลงานที่คุณสร้างจะเป็นที่จดจำและได้รับเสียงชื่นชมในระดับสากล",
            social: "คุณคือศูนย์กลางของผู้คน! ในอนาคตคุณจะมีเครือข่ายคอนเนคชันที่ทรงพลัง คอยหนุนหลังให้ทุกเป้าหมายสำเร็จ",
            leader: "เส้นทางนักบริหารกำลังเปิดออก! ความตัดสินใจของคุณในปีนี้จะเป็นจุดเปลี่ยนสำคัญของทีมและองค์กร",
            practical: "ทักษะการลงมือทำของคุณคืออาวุธสำคัญ! ผลลัพธ์ที่เป็นชิ้นเป็นอันจะสร้างรายได้และชื่อเสียงมหาศาลให้คุณ",
            tech: "โลกหมุนไปข้างหน้าด้วยเทคโนโลยี คุณคือคนที่จะเป็นผู้วางรากฐานและสร้างความเปลี่ยนแปลงให้สังคมในอนาคต",
            health: "ชีวิตของคุณคือการส่งต่อพลังงานที่ดี! ดวงชะตานี้จะมีแต่ความเจริญก้าวหน้า เพราะผู้คนรอบข้างรักและศรัทธาในตัวคุณ"
        };

        let state = {
            currentStep: -1, 
            scores: { logic: 0, creative: 0, social: 0, leader: 0, practical: 0, tech: 0, health: 0 }
        };

        function render() {
            const app = document.getElementById('app');
            app.className = "bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden p-6 md:p-8 fade-in";
            
            if (state.currentStep === -1) {
                app.innerHTML = `
                    <div class="text-center">
                        <div class="inline-block p-4 bg-indigo-100 rounded-full mb-6">
                            <span class="text-6xl">🧭</span>
                        </div>
                        <h1 class="text-4xl font-extrabold text-indigo-950 mb-2">Career Compass</h1>
                        <p class="text-indigo-600 font-medium mb-6">ค้นหาเส้นทางอาชีพที่ใช่ ในแบบที่เป็นคุณ</p>
                        
                        <div class="space-y-4 mb-8 text-left bg-gray-50 p-5 rounded-2xl border border-gray-100">
                            <p class="flex items-center text-gray-700"><span class="mr-3">🎯</span> ทำนายอาชีพด้วยอัลกอริทึมพฤติกรรม</p>
                            <p class="flex items-center text-gray-700"><span class="mr-3">🔮</span> ส่องอนาคตและดวงการทำงานของคุณ</p>
                            <p class="flex items-center text-gray-700"><span class="mr-3">📊</span> วิเคราะห์จุดแข็งในตัวคุณแบบเจาะลึก</p>
                        </div>

                        <button onclick="nextQuestion()" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white rounded-2xl font-bold text-lg shadow-lg hover:from-indigo-700 hover:to-purple-700 transition transform hover:scale-105 active:scale-95">
                            เริ่มต้นค้นหาอนาคต
                        </button>
                    </div>
                `;
            } else if (state.currentStep < questions.length) {
                const q = questions[state.currentStep];
                const progress = ((state.currentStep) / questions.length) * 100;
                app.innerHTML = `
                    <div class="mb-4 h-2 bg-gray-100 rounded-full overflow-hidden">
                        <div class="h-full bg-indigo-500 transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                    <h2 class="text-xl font-semibold text-gray-800 mb-6">${q.q}</h2>
                    <div class="space-y-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="selectOption('${opt.type}')" class="w-full text-left p-4 rounded-xl border border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 transition">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>
                `;
            } else {
                const total = Object.values(state.scores).reduce((a, b) => a + b, 0);
                const sortedScores = Object.entries(state.scores).sort((a,b) => b[1] - a[1]);
                const winner = sortedScores[0][0];
                const career = careers[winner] || careers.logic;
                
                app.innerHTML = `
                    <div class="text-center">
                        <div class="text-5xl mb-4">🔮</div>
                        <h2 class="text-xl font-bold text-indigo-900 mb-2">อาชีพที่ใช่สำหรับคุณคือ</h2>
                        <h3 class="text-2xl font-bold text-indigo-600 mb-6">${career.title}</h3>
                        
                        <div class="bg-indigo-50 p-4 rounded-2xl mb-6 text-left">
                            <h4 class="font-semibold text-indigo-900 mb-3 text-center border-b border-indigo-200 pb-2">วิเคราะห์ความถนัดของคุณ</h4>
                            ${sortedScores.slice(0, 3).map(([key, val]) => `
                                <div class="mb-2">
                                    <div class="flex justify-between text-sm text-gray-700 mb-1">
                                        <span>${key.toUpperCase()}</span>
                                        <span>${Math.round((val/total)*100)}%</span>
                                    </div>
                                    <div class="h-2 bg-indigo-200 rounded-full overflow-hidden">
                                        <div class="h-full bg-indigo-500" style="width: ${(val/total)*100}%"></div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="bg-yellow-50 border border-yellow-200 p-4 rounded-2xl mb-8">
                            <h4 class="font-bold text-yellow-800 mb-2">✨ คำทำนายอนาคต</h4>
                            <p class="text-sm text-yellow-900 italic">"${fortunes[winner]}"</p>
                        </div>

                        <button onclick="resetQuiz()" class="w-full py-3 bg-gray-200 text-gray-800 rounded-xl font-semibold hover:bg-gray-300 transition">เริ่มทำใหม่</button>
                    </div>
                `;
            }
        }

        function nextQuestion() {
            state.currentStep++;
            render();
        }

        function selectOption(type) {
            state.scores[type]++;
            nextQuestion();
        }

        function resetQuiz() {
            state.currentStep = -1;
            state.scores = { logic: 0, creative: 0, social: 0, leader: 0, practical: 0 };
            render();
        }

        // Initialize the app on load
        window.onload = render;
    </script>
</body>
</html>
